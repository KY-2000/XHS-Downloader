<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedNote Post Downloader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
    }
    
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .header h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: #666;
    }
    
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
      font-size: 13px;
    }
    
    .status.ready {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    
    .status.downloading {
      background: #fff3e0;
      color: #ef6c00;
    }
    
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .button.primary {
      background: #2196f3;
      color: white;
    }
    
    .button.primary:hover:not(:disabled) {
      background: #1976d2;
    }
    
    .button.primary:disabled {
      background: #bbdefb;
      cursor: not-allowed;
    }
    
    .settings {
      background: white;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
    
    .settings h3 {
      font-size: 13px;
      color: #333;
      margin-bottom: 8px;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .setting-item:last-child {
      border-bottom: none;
    }
    
    .setting-item label {
      font-size: 12px;
      color: #666;
    }
    
    .setting-item select {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      background: white;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      font-size: 11px;
      color: #999;
    }
    
    .footer a {
      color: #2196f3;
      text-decoration: none;
    }
    
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📥 RedNote Downloader</h1>
    <p>Download complete posts with media & text</p>
  </div>
  
  <div id="status" class="status ready">
    Checking page...
  </div>
  
  <button id="downloadBtn" class="button primary" disabled>
    Download This Post
  </button>
  
  <div class="settings">
    <h3>⚙️ Settings</h3>
    <div class="setting-item">
      <label>Image Format:</label>
      <select id="imageFormat">
        <option value="jpeg" selected>JPEG</option>
        <option value="png">PNG</option>
        <option value="webp">WEBP</option>
      </select>
    </div>
  </div>
  
  <div class="footer">
    <p>RedNote Post Downloader v1.0.0</p>
    <p>Based on <a href="https://github.com/JoeanAmier/XHS-Downloader" target="_blank">XHS-Downloader</a></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
